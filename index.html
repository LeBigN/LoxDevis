<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loxdevis - Générateur de devis</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E2001A">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="jspdf.umd.min.js"></script>
<style>
  :root {
    --loxam-red: #E2001A;
    --loxam-dark: #1a1a1a;
    --gris-fond: #f4f4f5;
    --gris-bord: #d4d4d8;
    --vert: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--gris-fond);
    color: var(--loxam-dark);
    padding-bottom: 120px;
  }
  header {
    background: var(--loxam-red);
    color: #fff;
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header h1 { font-size: 20px; font-weight: 800; letter-spacing: .5px; }
  header p { font-size: 12px; opacity: .9; margin-top: 2px; }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .card h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--loxam-red);
    border-bottom: 2px solid var(--loxam-red);
    padding-bottom: 6px;
    margin-bottom: 12px;
  }
  label { display: block; font-size: 13px; font-weight: 600; margin: 10px 0 4px; }
  input[type=text], input[type=number], input[type=tel], input[type=email], input[type=date], textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--gris-bord);
    border-radius: 8px;
    font-size: 16px;
    background: #fff;
  }
  input:focus, textarea:focus { outline: 2px solid var(--loxam-red); border-color: var(--loxam-red); }
  textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Lignes de devis */
  .ligne {
    border: 1px solid var(--gris-bord);
    border-left: 4px solid var(--loxam-red);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    background: #fafafa;
    position: relative;
  }
  .ligne .num {
    position: absolute;
    top: 8px;
    right: 10px;
    font-size: 11px;
    font-weight: 700;
    color: #999;
  }
  .ligne-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .ligne-grid label { margin: 0 0 4px; font-size: 12px; }
  .total-ligne {
    display: flex;
    align-items: flex-end;
    font-weight: 700;
    font-size: 15px;
    padding-bottom: 12px;
    color: var(--loxam-dark);
  }
  .btn-suppr {
    margin-top: 10px;
    background: none;
    border: 1px solid var(--gris-bord);
    color: #b91c1c;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-ajout {
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--loxam-red);
    background: #fff;
    color: var(--loxam-red);
    font-weight: 700;
    font-size: 15px;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-ajout:active { background: #fee2e2; }

  /* Total */
  .total-global {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    font-weight: 800;
    padding: 14px;
    background: var(--loxam-dark);
    color: #fff;
    border-radius: 8px;
  }
  .total-global span:last-child { color: #4ade80; }

  /* Barre d'action fixe */
  .actionbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid var(--gris-bord);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    z-index: 20;
  }
  .btn-pdf {
    flex: 1;
    padding: 14px;
    background: var(--loxam-red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
  }
  .btn-pdf:active { background: #b30015; }
  .btn-reset {
    padding: 14px 16px;
    background: #fff;
    border: 1px solid var(--gris-bord);
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--vert);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    z-index: 30;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <svg width="46" height="46" viewBox="0 0 64 64" aria-hidden="true">
      <rect width="64" height="64" rx="10" fill="#ffffff"/>
      <!-- Module / bungalow stylisé -->
      <rect x="10" y="20" width="44" height="28" rx="3" fill="#E2001A"/>
      <rect x="16" y="27" width="10" height="14" rx="1.5" fill="#ffffff"/>
      <rect x="31" y="27" width="8" height="8" rx="1.5" fill="#ffffff"/>
      <rect x="43" y="27" width="8" height="8" rx="1.5" fill="#ffffff"/>
      <rect x="8" y="16" width="48" height="5" rx="2" fill="#1a1a1a"/>
    </svg>
    <div>
      <h1 style="line-height:1;">LOXAM <span style="font-weight:300;">MODULE</span></h1>
      <p>Loxdevis &ndash; G&eacute;n&eacute;rateur de devis &ndash; Agence 9112</p>
    </div>
  </div>
</header>

<div class="container">

  <!-- Informations devis -->
  <div class="card">
    <h2>Informations devis</h2>
    <div class="row2">
      <div>
        <label for="numDevis">Num&eacute;ro du devis</label>
        <input type="text" id="numDevis" placeholder="DEV-2026-001">
      </div>
      <div>
        <label for="dateDevis">Date</label>
        <input type="date" id="dateDevis">
      </div>
    </div>
    <label for="nomClient">Nom du client</label>
    <input type="text" id="nomClient" placeholder="Nom du contact">
    <label for="entreprise">Entreprise</label>
    <input type="text" id="entreprise" placeholder="Raison sociale">
  </div>

  <!-- Descriptif -->
  <div class="card">
    <h2>Descriptif</h2>
    <textarea id="descriptif" placeholder="Objet du devis, chantier, contexte..."></textarea>
  </div>

  <!-- Lignes -->
  <div class="card">
    <h2>Lignes de prestation</h2>
    <div id="lignes"></div>
    <button class="btn-ajout" onclick="ajouterLigne()">+ Ajouter une ligne</button>
  </div>

  <!-- Total -->
  <div class="card">
    <div class="total-global">
      <span>TOTAL HT</span>
      <span id="totalHT">0,00 &euro;</span>
    </div>
  </div>

  <!-- Coordonnées client (bas de page PDF) -->
  <div class="card">
    <h2>Coordonn&eacute;es client (bas de page)</h2>
    <label for="piedNom">Nom du client</label>
    <input type="text" id="piedNom" placeholder="Reprend le nom du client si vide">
    <div class="row2">
      <div>
        <label for="piedTel">T&eacute;l&eacute;phone</label>
        <input type="tel" id="piedTel" placeholder="06 00 00 00 00">
      </div>
      <div>
        <label for="piedMail">E-mail</label>
        <input type="email" id="piedMail" placeholder="client@mail.fr">
      </div>
    </div>
  </div>

</div>

<div class="actionbar">
  <button class="btn-reset" onclick="reinitialiser()">Vider</button>
  <button class="btn-pdf" onclick="genererPDF()">G&eacute;n&eacute;rer le PDF</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'loxdevis-draft';
let compteurLigne = 0;

// ---------- Lignes ----------
function ajouterLigne(data) {
  compteurLigne++;
  const div = document.createElement('div');
  div.className = 'ligne';
  div.dataset.id = compteurLigne;
  div.innerHTML = `
    <span class="num">Ligne</span>
    <label>Désignation</label>
    <input type="text" class="l-desc" placeholder="Prestation, fourniture..." value="${data?.desc ? echap(data.desc) : ''}">
    <div class="ligne-grid">
      <div>
        <label>Quantité</label>
        <input type="number" class="l-qte" inputmode="decimal" step="any" min="0" placeholder="1" value="${data?.qte ?? ''}">
      </div>
      <div>
        <label>P.U. HT (€)</label>
        <input type="number" class="l-pu" inputmode="decimal" step="any" min="0" placeholder="0.00" value="${data?.pu ?? ''}">
      </div>
      <div class="total-ligne l-total">0,00 €</div>
    </div>
    <button class="btn-suppr" onclick="supprimerLigne(this)">Supprimer</button>
  `;
  document.getElementById('lignes').appendChild(div);
  div.querySelectorAll('input').forEach(i => i.addEventListener('input', () => { calculer(); sauvegarder(); }));
  renumeroter();
  calculer();
}

function supprimerLigne(btn) {
  btn.closest('.ligne').remove();
  renumeroter();
  calculer();
  sauvegarder();
}

function renumeroter() {
  document.querySelectorAll('#lignes .ligne').forEach((l, i) => {
    l.querySelector('.num').textContent = 'Ligne ' + (i + 1);
  });
}

function calculer() {
  let total = 0;
  document.querySelectorAll('#lignes .ligne').forEach(l => {
    const qte = parseFloat(l.querySelector('.l-qte').value) || 0;
    const pu = parseFloat(l.querySelector('.l-pu').value) || 0;
    const t = qte * pu;
    total += t;
    l.querySelector('.l-total').textContent = fmt(t);
  });
  document.getElementById('totalHT').textContent = fmt(total);
  return total;
}

function fmt(n) {
  return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function echap(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------- Brouillon localStorage ----------
function sauvegarder() {
  const data = {
    numDevis: v('numDevis'), dateDevis: v('dateDevis'),
    nomClient: v('nomClient'), entreprise: v('entreprise'),
    descriptif: v('descriptif'),
    piedNom: v('piedNom'), piedTel: v('piedTel'), piedMail: v('piedMail'),
    lignes: [...document.querySelectorAll('#lignes .ligne')].map(l => ({
      desc: l.querySelector('.l-desc').value,
      qte: l.querySelector('.l-qte').value,
      pu: l.querySelector('.l-pu').value
    }))
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function charger() {
  const raw = localStorage.getItem(STORAGE_KEY);
  document.getElementById('dateDevis').value = new Date().toISOString().slice(0, 10);
  if (!raw) { ajouterLigne(); return; }
  try {
    const d = JSON.parse(raw);
    sv('numDevis', d.numDevis); if (d.dateDevis) sv('dateDevis', d.dateDevis);
    sv('nomClient', d.nomClient); sv('entreprise', d.entreprise);
    sv('descriptif', d.descriptif);
    sv('piedNom', d.piedNom); sv('piedTel', d.piedTel); sv('piedMail', d.piedMail);
    if (d.lignes && d.lignes.length) d.lignes.forEach(l => ajouterLigne(l));
    else ajouterLigne();
  } catch (e) { ajouterLigne(); }
  calculer();
}

function v(id) { return document.getElementById(id).value.trim(); }
function sv(id, val) { if (val) document.getElementById(id).value = val; }

function reinitialiser() {
  if (!confirm('Vider tout le devis ?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('input, textarea').forEach(i => i.addEventListener('input', sauvegarder));

// ---------- Génération PDF ----------
function genererPDF() {
  const client = v('nomClient') || 'Client';
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, MARGE = 15;
  let y = 0;

  // Bandeau rouge
  doc.setFillColor(226, 0, 26);
  doc.rect(0, 0, W, 24, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('LOXAM MODULE', MARGE, 12);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text('Agence 9112', MARGE, 18);

  doc.setFontSize(16);
  doc.setFont('helvetica', 'bold');
  doc.text('DEVIS', W - MARGE, 14, { align: 'right' });

  y = 34;
  doc.setTextColor(26, 26, 26);

  // Bloc infos
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text('Devis n° : ', MARGE, y);
  doc.setFont('helvetica', 'normal');
  doc.text(v('numDevis') || '-', MARGE + 20, y);

  doc.setFont('helvetica', 'bold');
  doc.text('Date : ', W - MARGE - 40, y);
  doc.setFont('helvetica', 'normal');
  const dt = v('dateDevis') ? new Date(v('dateDevis')).toLocaleDateString('fr-FR') : new Date().toLocaleDateString('fr-FR');
  doc.text(dt, W - MARGE - 27, y);

  y += 7;
  doc.setFont('helvetica', 'bold');
  doc.text('Client : ', MARGE, y);
  doc.setFont('helvetica', 'normal');
  doc.text(client, MARGE + 15, y);

  y += 6;
  doc.setFont('helvetica', 'bold');
  doc.text('Entreprise : ', MARGE, y);
  doc.setFont('helvetica', 'normal');
  doc.text(v('entreprise') || '-', MARGE + 23, y);

  // Descriptif
  y += 10;
  if (v('descriptif')) {
    doc.setFillColor(244, 244, 245);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('DESCRIPTIF', MARGE, y);
    y += 5;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    const lignesDesc = doc.splitTextToSize(v('descriptif'), W - 2 * MARGE);
    doc.text(lignesDesc, MARGE, y);
    y += lignesDesc.length * 4.2 + 6;
  }

  // Tableau
  const colX = { desc: MARGE, qte: 130, pu: 152, total: 178 };
  const finTableau = W - MARGE;

  function enteteTableau() {
    doc.setFillColor(226, 0, 26);
    doc.rect(MARGE, y, finTableau - MARGE, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text('Désignation', colX.desc + 2, y + 5.5);
    doc.text('Qté', colX.qte + 2, y + 5.5);
    doc.text('P.U. HT', colX.pu + 2, y + 5.5);
    doc.text('Total HT', colX.total + 2, y + 5.5);
    y += 8;
    doc.setTextColor(26, 26, 26);
  }

  enteteTableau();

  let totalHT = 0;
  let alterne = false;
  document.querySelectorAll('#lignes .ligne').forEach(l => {
    const desc = l.querySelector('.l-desc').value.trim();
    const qte = parseFloat(l.querySelector('.l-qte').value) || 0;
    const pu = parseFloat(l.querySelector('.l-pu').value) || 0;
    if (!desc && !qte && !pu) return;
    const t = qte * pu;
    totalHT += t;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    const descLignes = doc.splitTextToSize(desc || '-', colX.qte - colX.desc - 4);
    const h = Math.max(8, descLignes.length * 4.2 + 3.5);

    if (y + h > 265) { doc.addPage(); y = 20; enteteTableau(); }

    if (alterne) {
      doc.setFillColor(248, 248, 248);
      doc.rect(MARGE, y, finTableau - MARGE, h, 'F');
    }
    alterne = !alterne;

    doc.text(descLignes, colX.desc + 2, y + 5);
    doc.text(String(qte), colX.qte + 2, y + 5);
    doc.text(pu.toFixed(2) + ' €', colX.pu + 2, y + 5);
    doc.setFont('helvetica', 'bold');
    doc.text(t.toFixed(2) + ' €', colX.total + 2, y + 5);
    y += h;
    doc.setDrawColor(212, 212, 216);
    doc.line(MARGE, y, finTableau, y);
  });

  // Total HT
  y += 4;
  if (y > 255) { doc.addPage(); y = 20; }
  doc.setFillColor(26, 26, 26);
  doc.rect(110, y, finTableau - 110, 10, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('TOTAL HT', 114, y + 6.8);
  doc.text(totalHT.toLocaleString('fr-FR', { minimumFractionDigits: 2 }) + ' €', finTableau - 3, y + 6.8, { align: 'right' });
  doc.setTextColor(26, 26, 26);

  // Pied de page : coordonnées client (sur chaque page)
  const nbPages = doc.getNumberOfPages();
  for (let p = 1; p <= nbPages; p++) {
    doc.setPage(p);
    const yPied = 280;
    doc.setDrawColor(226, 0, 26);
    doc.setLineWidth(0.6);
    doc.line(MARGE, yPied, W - MARGE, yPied);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text(v('piedNom') || client, MARGE, yPied + 5.5);
    doc.setFont('helvetica', 'normal');
    const coords = [v('piedTel'), v('piedMail')].filter(Boolean).join('  -  ');
    if (coords) doc.text(coords, MARGE, yPied + 10.5);
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text('Page ' + p + '/' + nbPages, W - MARGE, yPied + 10.5, { align: 'right' });
    doc.setTextColor(26, 26, 26);
  }

  doc.save('Devis LOXAM Module - ' + client + '.pdf');
  toast('PDF généré ✓');
}

charger();

// ---------- Service worker (offline) ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
